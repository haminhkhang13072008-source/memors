<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Memories Pro - Canva Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&family=Special+Elite&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --paper: #f4f1ea; --brown: #4a3f35; --accent: #e67e22; --green: #27ae60; --dark: #1e1e1e; }
        body { font-family: 'Courier Prime', monospace; background: var(--paper); color: var(--brown); margin: 0; padding: 10px; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        
        /* Layout chính */
        .card { background: #fffdf5; padding: 15px; border-radius: 2px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 500px; width: 100%; border: 1px solid #d9d4c5; position: relative; padding-bottom: 100px; }
        .film-strip { background: #111; padding: 40px 10px; display: flex; flex-direction: column; gap: 30px; margin: 20px 0; border-left: 8px dashed #333; border-right: 8px dashed #333; position: relative; z-index: 1; }
        .polaroid { background: white; padding: 10px 10px 30px 10px; box-shadow: 3px 3px 10px rgba(0,0,0,0.4); position: relative; }
        .polaroid img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }

        /* Sticker Engine */
        .sticker-wrapper { position: absolute; z-index: 100; touch-action: none; display: inline-block; padding: 10px; }
        .sticker-img { width: 100px; display: block; pointer-events: none; filter: drop-shadow(2px 2px 5px rgba(0,0,0,0.2)); }
        .sticker-controls { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; border: 2px dashed var(--accent); pointer-events: none; }
        .edit-mode-on .sticker-wrapper.active .sticker-controls { display: block; }
        
        /* Nút điều khiển Sticker */
        .s-btn { position: absolute; width: 30px; height: 30px; background: white; border: 2px solid var(--brown); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 110; pointer-events: auto; font-weight: bold; }
        .s-del { top: -15px; left: -15px; color: red; }
        .s-size { bottom: -15px; right: -15px; color: var(--green); cursor: nwse-resize; }

        /* Nút Bút Chì Nổi (Floating Action Button) */
        .btn-edit-float { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; background: var(--dark); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; cursor: pointer; z-index: 2500; box-shadow: 0 5px 15px rgba(0,0,0,0.3); border: 2px solid white; transition: 0.3s; }
        .is-editing { background: var(--green) !important; transform: scale(1.1) rotate(360deg); }

        /* Kho Elements phong cách Canva */
        #sticker-store { display: none; position: fixed; bottom: 0; left: 0; width: 100%; height: 85vh; background: white; z-index: 2000; border-radius: 20px 20px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.4); padding: 20px; box-sizing: border-box; flex-direction: column; transition: 0.3s ease-out; }
        .store-header { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
        #searchStk { flex: 1; padding: 15px; border: 2px solid #eee; border-radius: 12px; font-size: 16px; outline: none; font-family: inherit; }
        #searchStk:focus { border-color: var(--accent); }
        .stk-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; overflow-y: auto; flex: 1; padding-bottom: 40px; }
        .stk-item { width: 100%; aspect-ratio: 1/1; object-fit: contain; cursor: pointer; background: #f8f8f8; border-radius: 8px; padding: 5px; box-sizing: border-box; transition: 0.2s; }
        .stk-item:active { transform: scale(0.9); }

        .btn-retro { background: var(--brown); color: var(--paper); border: none; padding: 15px; cursor: pointer; font-weight: bold; text-transform: uppercase; width: 100%; margin-top: 10px; font-family: inherit; font-size: 12px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="font-family: 'Special Elite'; text-align: center; letter-spacing: 2px;">VINTAGE ROLL</h2>
    
    <div id="lock-screen">
        <center><input type="password" id="passInput" placeholder="Mật mã" style="width:80%; padding:15px; margin:20px 0; border:1px solid #ddd; text-align:center;"></center>
        <button class="btn-retro" onclick="unlock()">MỞ KHÓA FILM</button>
    </div>

    <div id="main-screen" style="display:none;">
        <div id="gallery-container" style="position: relative;">
            <div id="gallery" class="film-strip"></div>
        </div>
        <button class="btn-retro" onclick="document.getElementById('fileInp').click()">+ CHỤP ẢNH MỚI</button>
        <button class="btn-retro" style="background: var(--accent)" onclick="openStickerStore()">🎨 KHO ELEMENTS (CANVA)</button>
        <input type="file" id="fileInp" accept="image/*" style="display:none" onchange="uploadToCloudinary()">
    </div>
</div>

<!-- Nút Bút Chì -->
<div id="editBtn" class="btn-edit-float" onclick="toggleEditMode()" style="display:none;">✎</div>

<!-- Kho Elements -->
<div id="sticker-store">
    <div class="store-header">
        <input type="text" id="searchStk" placeholder="Tìm kiếm elements (Y2K, Meme, Heart...)">
        <button onclick="searchGiphy()" style="padding: 12px 20px; background: var(--dark); color: white; border:none; border-radius:10px; font-weight:bold;">TÌM</button>
        <button onclick="closeStickerStore()" style="font-size: 24px; background:none; border:none; cursor:pointer;">×</button>
    </div>
    <div class="stk-grid" id="stkResult">
        <!-- Elements sẽ hiện ở đây -->
    </div>
</div>

<script>
    // --- CẤU HÌNH FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyA8-ctuFLh3DuB68g180CEux7iZ2ZKqYMU",
        authDomain: "lovetouching-a8981.firebaseapp.com",
        projectId: "lovetouching-a8981",
        appId: "1:325823794583:web:6b190f660d75b7e547c8d2"
    };
    const CLOUD_NAME = "dvvso2wpc";
    const UPLOAD_PRESET = "stodjvzb";
    const GIPHY_API_KEY = "dc6zaTOxFJmzC"; // API Key kết nối kho Elements toàn cầu

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const urlParams = new URLSearchParams(window.location.search);
    const chipId = urlParams.get('id') || 'demo_vintage';

    let currentImages = [];
    let currentStickers = [];
    let isEditMode = false;

    async function unlock() {
        const passVal = document.getElementById('passInput').value;
        const doc = await db.collection('toys').doc(chipId).get();
        if (doc.exists && passVal === doc.data().password) {
            currentImages = doc.data().images || [];
            currentStickers = doc.data().stickers || [];
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'block';
            document.getElementById('editBtn').style.display = 'flex';
            renderGallery();
            renderStickers();
        } else { alert("Mật mã không đúng!"); }
    }

    // Chế độ sửa (Bút chì)
    function toggleEditMode() {
        isEditMode = !isEditMode;
        const btn = document.getElementById('editBtn');
        if(isEditMode) {
            btn.innerHTML = "✓";
            btn.classList.add('is-editing');
            document.body.classList.add('edit-mode-on');
        } else {
            btn.innerHTML = "✎";
            btn.classList.remove('is-editing');
            document.body.classList.remove('edit-mode-on');
            document.querySelectorAll('.sticker-wrapper').forEach(w => w.classList.remove('active'));
            saveData();
        }
        renderGallery();
    }

    // --- KHO ELEMENTS (CANVA STYLE) ---
    function openStickerStore() {
        document.getElementById('sticker-store').style.display = 'flex';
        if(document.getElementById('stkResult').innerHTML.trim() === "") {
            searchGiphy("trending stickers aesthetic"); // Hiện xu hướng khi mới mở
        }
    }
    function closeStickerStore() { document.getElementById('sticker-store').style.display = 'none'; }

    async function searchGiphy() {
        const query = document.getElementById('searchStk').value || "cute stickers";
        const grid = document.getElementById('stkResult');
        grid.innerHTML = "<p style='grid-column: 1/4; text-align:center;'>Đang tìm kiếm...</p>";
        
        try {
            const response = await fetch(`https://api.giphy.com/v1/stickers/search?api_key=${GIPHY_API_KEY}&q=${encodeURIComponent(query)}&limit=30&rating=g`);
            const content = await response.json();
            grid.innerHTML = "";
            
            content.data.forEach(item => {
                const img = document.createElement('img');
                img.src = item.images.fixed_height_small.url; // Load nhanh
                img.className = 'stk-item';
                img.onclick = () => {
                    addSticker(item.images.fixed_height.url); // Lấy ảnh nét hơn khi dán
                };
                grid.appendChild(img);
            });
        } catch(e) { grid.innerHTML = "Lỗi kết nối kho Elements."; }
    }

    function addSticker(url) {
        currentStickers.push({ url, x: 50, y: 200, size: 120 });
        renderStickers();
        closeStickerStore();
        if(!isEditMode) toggleEditMode();
    }

    // --- ENGINE XỬ LÝ STICKER ---
    function renderStickers() {
        document.querySelectorAll('.sticker-wrapper').forEach(el => el.remove());
        currentStickers.forEach((stk, index) => {
            const wrap = document.createElement('div');
            wrap.className = 'sticker-wrapper';
            wrap.style.left = stk.x + 'px';
            wrap.style.top = stk.y + 'px';
            
            wrap.innerHTML = `
                <div class="sticker-controls">
                    <div class="s-btn s-del" onclick="removeSticker(${index})">×</div>
                    <div class="s-btn s-size" onmousedown="initResize(event, ${index})" ontouchstart="initResize(event, ${index})">↘</div>
                </div>
                <img src="${stk.url}" class="sticker-img" style="width: ${stk.size}px">
            `;

            wrap.onmousedown = (e) => {
                if(!isEditMode || e.target.classList.contains('s-btn')) return;
                document.querySelectorAll('.sticker-wrapper').forEach(w => w.classList.remove('active'));
                wrap.classList.add('active');
                initDrag(e, index, wrap);
            };
            wrap.ontouchstart = wrap.onmousedown;
            document.getElementById('gallery-container').appendChild(wrap);
        });
    }

    function initDrag(e, idx, el) {
        const clientX = e.clientX || e.touches[0].clientX;
        const clientY = e.clientY || e.touches[0].clientY;
        const startX = clientX - el.offsetLeft;
        const startY = clientY - el.offsetTop;
        
        const move = (me) => {
            const mX = me.clientX || me.touches[0].clientX;
            const mY = me.clientY || me.touches[0].clientY;
            const x = mX - startX; const y = mY - startY;
            el.style.left = x + 'px'; el.style.top = y + 'px';
            currentStickers[idx].x = x; currentStickers[idx].y = y;
        };
        const stop = () => { window.onmousemove = null; window.ontouchmove = null; };
        window.onmousemove = move; window.ontouchmove = move;
        window.onmouseup = stop; window.ontouchend = stop;
    }

    function initResize(e, idx) {
        e.stopPropagation(); e.preventDefault();
        const startX = e.clientX || e.touches[0].clientX;
        const startSize = currentStickers[idx].size;
        const move = (me) => {
            const mX = me.clientX || me.touches[0].clientX;
            const newSize = Math.max(40, startSize + (mX - startX));
            currentStickers[idx].size = newSize;
            renderStickers();
            document.querySelectorAll('.sticker-wrapper')[idx].classList.add('active');
        };
        const stop = () => { window.onmousemove = null; window.ontouchmove = null; };
        window.onmousemove = move; window.ontouchmove = move;
        window.onmouseup = stop; window.ontouchend = stop;
    }

    function removeSticker(idx) { currentStickers.splice(idx, 1); renderStickers(); }

    // --- QUẢN LÝ DỮ LIỆU ---
    function renderGallery() {
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = "";
        [...currentImages].reverse().forEach((url, i) => {
            const div = document.createElement('div');
            div.className = "polaroid";
            div.style.transform = `rotate(${(Math.random()*4-2)}deg)`;
            div.innerHTML = `<img src="${url}">`;
            if(isEditMode) div.innerHTML += `<div class="s-btn s-del" style="top:5px; right:5px" onclick="deleteImg(${currentImages.length-1-i})">×</div>`;
            gallery.appendChild(div);
        });
    }

    async function saveData() {
        await db.collection('toys').doc(chipId).update({ images: currentImages, stickers: currentStickers });
    }

    async function uploadToCloudinary() {
        const file = document.getElementById('fileInp').files[0];
        if (!file) return;
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', UPLOAD_PRESET);
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: formData });
        const data = await res.json();
        currentImages.push(data.secure_url);
        await saveData();
        renderGallery();
    }

    async function deleteImg(idx) {
        if(confirm("Xóa ảnh này?")) {
            currentImages.splice(idx, 1);
            await saveData();
            renderGallery();
        }
    }
</script>
</body>
</html>
